<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journée de l'Apéro</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #2c3e50;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            padding: 0 20px;
        }

        #date-container {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            background-color: #d35400;
            padding: 15px 30px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .emojis {
            font-size: 6rem;
            margin-bottom: 20px;
        }

        .verre {
            display: inline-block;
        }

        .gauche {
            animation: gaucheMove 2s infinite ease-in-out;
        }

        .centre {
            animation: centreBounce 2s infinite ease-in-out;
        }

        .droite {
            animation: droiteMove 2s infinite ease-in-out;
        }

        @keyframes gaucheMove {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            40% { transform: translateX(25px) rotate(10deg); }
            50% { transform: translateX(30px) rotate(15deg); }
            60% { transform: translateX(25px) rotate(10deg); }
        }

        @keyframes centreBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes droiteMove {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            40% { transform: translateX(-25px) rotate(-10deg); }
            50% { transform: translateX(-30px) rotate(-15deg); }
            60% { transform: translateX(-25px) rotate(-10deg); }
        }

        p {
            font-size: 1.5rem;
            max-width: 600px;
            padding: 0 20px;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <h1>Journée de l'Apéro 🍹</h1>

    <div id="date-container">
        Aujourd’hui !
    </div>

    <div class="emojis">
        <span class="verre gauche">🍷</span>
        <span class="verre centre">🍷</span>
        <span class="verre droite">🍷</span>
    </div>

    <p>Il est temps de trinquer ! 🥂</p>

</body>
</html>
