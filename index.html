<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journée de l'Apéro</title>
    <style>
        body {
            margin: 0;
            /* Changé height en min-height pour permettre le scroll */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #2c3e50;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
            /* Suppression de overflow: hidden pour autoriser le défilement */
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        #date-container {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            background-color: #d35400;
            padding: 15px 30px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .emojis {
            font-size: 6rem;
            margin-bottom: 20px;
        }

        .verre {
            display: inline-block;
        }

        .gauche { animation: gaucheMove 2s infinite ease-in-out; }
        .centre { animation: centreBounce 2s infinite ease-in-out; }
        .droite { animation: droiteMove 2s infinite ease-in-out; }

        @keyframes gaucheMove {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(30px) rotate(15deg); }
        }

        @keyframes centreBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes droiteMove {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(-30px) rotate(-15deg); }
        }

        p {
            font-size: 1.5rem;
            max-width: 600px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        #btn-biere {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.4);
            transition: all 0.2s;
        }

        #btn-biere:hover {
            background-color: #2ecc71;
            transform: scale(1.05);
        }

        #btn-biere:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            transform: scale(1);
        }

        .compteur-container {
            font-size: 2rem;
            font-weight: bold;
            color: #c0392b;
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px dashed #d35400;
        }
    </style>
</head>
<body>

    <div class="emojis">
        <span class="verre gauche">🍷</span>
        <span class="verre centre">🍻</span>
        <span class="verre droite">🍹</span>
    </div>
    
    <h1>Incroyable coïncidence !</h1>
    
    <div id="date-container">Chargement de la date...</div>
    
    <p>
        C'est officiellement la <strong>Journée Internationale de l'Apéro</strong> ! <br><br>
        On se la colle fort ce soir !
    </p>

    <button id="btn-biere">🍻 J'ai bu une bière !</button>

    <div class="compteur-container">
        Total de bières bues : <span id="affichage-compteur">...</span>
    </div>

    <script>
        // 1. AFFICHER LA DATE
        function afficherDateDuJour() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const date = new Date();
            let dateFormatee = date.toLocaleDateString('fr-FR', options);
            dateFormatee = dateFormatee.charAt(0).toUpperCase() + dateFormatee.slice(1);
            document.getElementById('date-container').innerText = "Aujourd'hui, " + dateFormatee ;
        }
        afficherDateDuJour();

        // 2. CONFIGURATION GOOGLE SHEETS
        // REMPLACE BIEN L'URL CI-DESSOUS PAR TON URL DE DÉPLOIEMENT
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxLmWvVZbgzFXqnZffYO3fvQQPRFw0BMoamfhR2Po85DekHIzF7ko2kdRlYd0emQj6QzA/exec";
        const btnBiere = document.getElementById("btn-biere");
        const affichageCompteur = document.getElementById("affichage-compteur");

        // Fonction pour récupérer le score sans ajouter de +1
        function chargerCompteur() {
            fetch(scriptUrl + "?action=lire")
                .then(response => response.text())
                .then(data => {
                    affichageCompteur.innerText = data;
                })
                .catch(error => {
                    console.error("Erreur chargement:", error);
                    affichageCompteur.innerText = "Erreur";
                });
        }

        // Charger le compteur dès l'arrivée sur le site
        chargerCompteur();

        // 3. ACTION DU BOUTON (+1)
        btnBiere.addEventListener("click", () => {
            btnBiere.disabled = true;
            btnBiere.innerText = "Santé ! ⏳..."; 
            
            // On envoie l'action "boire" pour faire le +1
            fetch(scriptUrl + "?action=boire")
                .then(response => response.text())
                .then(data => {
                    affichageCompteur.innerText = data; 
                    btnBiere.disabled = false;
                    btnBiere.innerText = "🍻 J'ai bu une bière !";
                })
                .catch(error => {
                    console.error("Erreur clic:", error);
                    btnBiere.disabled = false;
                    btnBiere.innerText = "❌ Réessaie !";
                });
        });
    </script>

</body>
</html>
