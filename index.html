<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journée de l'Apéro</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #2c3e50;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            padding: 0 20px;
        }

        #date-container {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            background-color: #d35400;
            padding: 15px 30px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .emojis {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: trinquer 2s infinite;
        }

        p {
            font-size: 1.5rem;
            max-width: 600px;
            padding: 0 20px;
            line-height: 1.5;
        }

        /* Animation pour faire rebondir/trinquer les verres */
        @keyframes trinquer {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(0deg); }
            40% { transform: translateY(-20px) rotate(-10deg); }
            60% { transform: translateY(-10px) rotate(10deg); }
        }
    </style>
</head>
<body>

    <div class="emojis">🍻🍷🍹</div>
    
    <h1>Incroyable coïncidence !</h1>
    
    <div id="date-container">Chargement de la date...</div>
    
    <p>C'est officiellement la <strong>Journée Internationale de l'Apéro</strong> ! <br><br>
    On se la colle fort ce soir !</p>

    <script>
        // Fonction pour obtenir et formater la date du jour
        function afficherDateDuJour() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const date = new Date();
            let dateFormatee = date.toLocaleDateString('fr-FR', options);
            
            // Mettre la première lettre en majuscule
            dateFormatee = dateFormatee.charAt(0).toUpperCase() + dateFormatee.slice(1);
            
            // Injecter le texte dans la page
            document.getElementById('date-container').innerText = "Aujourd'hui, " + dateFormatee + ",";
        }

        // Exécuter la fonction au chargement de la page
        afficherDateDuJour();
    </script>

</body>
</html>
